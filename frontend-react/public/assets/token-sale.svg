<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#ffffff" opacity="0.1"/>
  <circle cx="700" cy="320" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="650" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- Main coin -->
  <circle cx="400" cy="200" r="120" fill="url(#coin)" stroke="#fff" stroke-width="4"/>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#fff" text-anchor="middle">OCT</text>
  
  <!-- Title -->
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">OpenClaw Token Sale</text>
  
  <!-- Subtitle -->
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.8" text-anchor="middle">The Future of AI Assistant</text>
</svg>
